# Governance configuration — copy this file to `org.yml` and edit it to instantiate for your organisation.
# `org.yml` is gitignored: keep your real committee names, links, and recipients out of the repo.
# All templates read from this single config; no other file contains org-specific values.
# See README.md for how to generate agendas, minutes, and update the actions register.

org:
  name: "Your Organisation Name"
  short_name: "ORG"

committee:
  members:
    - name: "Chairperson Name"
      role: "Chair"
    - name: "Treasurer Name"
      role: "Treasurer"
    - name: "Member Name"
      role: "Member"
  quorum: 2
  minutes_prepared_by: "Chairperson Name"

meetings:
  # Human-readable description of when meetings occur
  cadence: "first Tuesday of the month"
  time_display: "8:00pm"
  timezone: "Pacific/Auckland"
  timezone_display: "NZST"
  platform: "Google Meet"
  link: "https://meet.google.com/your-meeting-link"
  # Standard agenda sections; edit duration_min and presenter per org
  default_sections:
    - name: "Welcome, Apologies, and Confirmation of Previous Minutes"
      duration_min: 5
      presenter: "Chair"
    - name: "Action Updates"
      duration_min: 15
      presenter: "Secretary"
    - name: "Reports"
      duration_min: 10
      presenter: "Various"
    - name: "Discussion / Decision Items"
      duration_min: 25
      presenter: "Chair"
    - name: "General Business"
      duration_min: 5
      presenter: "All"

agm:
  # Month (1-12) when the AGM is typically held
  month: 11
  month_name: "November"
  # Minimum notice days required before AGM (check your constitution)
  notice_days: 14
  # Prep milestones for scripts/agm-timeline.py.
  # offset_days is relative to the AGM date (negative = before, positive = after).
  # The special value "notice" resolves to -notice_days so the formal notice
  # milestone always tracks your constitution's notice period.
  milestones:
    - id: set-date
      offset_days: -90
      title: "Confirm AGM date, venue/platform, and returning officer"
      owner_role: "Chair"
    - id: call-reports
      offset_days: -60
      title: "Call for officer reports and open committee nominations"
      owner_role: "Secretary"
    - id: draft-financials
      offset_days: -45
      title: "Draft annual financial statements"
      owner_role: "Treasurer"
    - id: formal-notice
      offset_days: notice
      title: "Send formal AGM notice and agenda to all members"
      owner_role: "Secretary"
    - id: circulate-papers
      offset_days: -7
      title: "Circulate AGM papers: officer reports, financial statements, nominations"
      owner_role: "Secretary"
    - id: agm
      offset_days: 0
      title: "Hold the AGM"
      owner_role: "Chair"
    - id: minutes
      offset_days: 7
      title: "Draft and circulate AGM minutes"
      owner_role: "Secretary"
    - id: file-return
      offset_days: 30
      title: "File annual return and financial statements with the registrar"
      owner_role: "Treasurer"

# Multisig treasury custody — omit this section if the org holds no crypto treasury.
# Only roles/labels here; real key-holder names belong in your gitignored org.yml.
wallet:
  scheme: "2-of-3"
  check_cadence: "quarterly"
  holders:
    - "Key Holder A"
    - "Key Holder B"
    - "Key Holder C"

# Quarterly newsletters, two audiences: current members and external stakeholders
# (e.g. policymakers, journalists, event attendees).
newsletter:
  cadence: "quarterly"
  member_sections:
    - "From the Chair"
    - "Policy and advocacy update"
    - "Events"
    - "Treasury and membership"
  external_sections:
    - "About us"
    - "Policy positions and submissions"
    - "News and analysis"
    - "Upcoming events"

email:
  # method: manual | mailerlite | smtp
  # "manual" — export PDF and send by hand; no integration configured.
  # "mailerlite" — use MailerLite API (requires MAILERLITE_API_KEY env var; see README).
  # "smtp" — send via SMTP relay (requires SMTP_HOST/SMTP_USER/SMTP_PASS env vars; see README).
  method: "manual"
  # List of recipient email addresses for meeting distribution (agenda + minutes)
  distribution_list: []
